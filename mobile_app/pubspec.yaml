name: app_web_view
description: "Ứng dụng di động cho hệ thống Chatbot YHCT GraphRAG."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Nhúng giao diện web hiện có của chatbot vào app
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.10.0

  # Xử lý xác thực (Google OAuth)
  flutter_web_auth_2: ^4.0.0

  # Kết nối API GraphRAG backend (3-Agent)
  http: ^1.2.0

  # Lưu trữ token và thông tin phiên làm việc
  shared_preferences: ^2.3.0

  # Thư viện hỗ trợ UI hiện đại (thêm để giao diện chat chuyên nghiệp hơn)
  flutter_chat_ui: ^1.6.11
  flutter_chat_types: 3.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.1"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png